{% extends "base.html" %}
{% block content %}
<div class="container" style="max-width: 700px;">
    <div class="card" style="border-left: 4px solid var(--accent);">
        <h2>⚙️ Paramètres du Bâtisseur</h2>
        <p class="muted small">Gérez votre image et votre mission sur le réseau.</p>
    </div>

    <form method="post" enctype="multipart/form-data">
        <!-- ZONE VISUELLE (Couverture + Profil) -->
        <div class="card" style="padding: 0; overflow: visible; margin-bottom: 60px;">
            <!-- Couverture -->
            <div style="height: 160px; background: var(--accent); position: relative; border-radius: 12px 12px 0 0;">
                <img src="{{ url_for('static', filename='uploads/' + (user.cover_pic if user.cover_pic else 'default_cover.jpg')) }}" 
                     style="width: 100%; height: 100%; object-fit: cover; border-radius: 12px 12px 0 0;">
                
                <label style="position: absolute; bottom: 10px; right: 10px; background: rgba(0,0,0,0.6); padding: 5px 12px; border-radius: 20px; cursor: pointer; font-size: 12px;">
                    🖼️ Modifier la couverture
                    <input type="file" name="cover_pic" style="display: none;" onchange="this.form.submit()">
                </label>

                <!-- Profil (Chevauchement) -->
                <div style="position: absolute; bottom: -50px; left: 20px;">
                    <img src="{{ url_for('static', filename='uploads/' + (user.profile_pic if user.profile_pic else 'default_avatar.png')) }}" 
                         class="avatar-large" style="width: 100px; height: 100px; border: 5px solid var(--panel);">
                    <label style="position: absolute; bottom: 0; right: 0; background: var(--accent); width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 3px solid var(--panel);">
                        📷 <input type="file" name="profile_pic" style="display: none;" onchange="this.form.submit()">
                    </label>
                </div>
            </div>
        </div>

        <!-- FORMULAIRE TEXTE -->
        <div class="card">
            <label class="muted small">Nom d'affichage</label>
            <input type="text" name="display_name" value="{{ user.display_name }}" style="margin-bottom: 20px;">

            <label class="muted small">Ma Mission (Bio)</label>
            <textarea name="bio" rows="4" placeholder="Quelle est votre contribution pour l'Afrique ?">{{ user.bio }}</textarea>

            <button type="submit" class="btn" style="width: 100%; margin-top: 10px;">Enregistrer les modifications</button>
        </div>
    </form>
</div>
{% endblock %}
