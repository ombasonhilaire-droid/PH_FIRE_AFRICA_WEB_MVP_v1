{% extends "base.html" %}
{% block content %}
<div class="container" style="max-width: 800px;">
    
    <form method="post" enctype="multipart/form-data">
        <!-- ZONE VISUELLE (Boutons de modification inclus) -->
        <div class="card" style="padding: 0; overflow: visible; margin-bottom: 60px; position: relative;">
            <div style="height: 160px; background: var(--accent); position: relative; border-radius: 12px 12px 0 0;">
                <img src="{{ url_for('static', filename='uploads/' + (user.cover_pic if user.cover_pic else 'default_cover.jpg')) }}" 
                     style="width: 100%; height: 100%; object-fit: cover; border-radius: 12px 12px 0 0;">
                
                <!-- BOUTON MODIFIER COUVERTURE -->
                <label style="position: absolute; bottom: 10px; right: 10px; background: rgba(0,0,0,0.7); color: white; padding: 6px 12px; border-radius: 20px; cursor: pointer; font-size: 11px; border: 1px solid var(--accent);">
                    🖼️ Changer la couverture
                    <input type="file" name="cover_pic" style="display: none;" onchange="this.form.submit()">
                </label>

                <!-- PHOTO DE PROFIL + BOUTON -->
                <div style="position: absolute; bottom: -50px; left: 20px;">
                    <div style="position: relative;">
                        <img src="{{ url_for('static', filename='uploads/' + (user.profile_pic if user.profile_pic else 'default_avatar.png')) }}" 
                             class="avatar-large" style="width: 100px; height: 100px; border: 5px solid var(--panel);">
                        <label style="position: absolute; bottom: 0; right: 0; background: var(--accent); width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 3px solid var(--panel);">
                            📷 <input type="file" name="profile_pic" style="display: none;" onchange="this.form.submit()">
                        </label>
                    </div>
                </div>
            </div>
        </div>

        <!-- LANGUES ET PRÉFÉRENCES -->
        <div class="card">
            <h3 style="margin-bottom: 15px;">🌍 Langue & Culture</h3>
            <select name="language" style="width: 100%; padding: 12px; background: #000; color: white; border-radius: 8px; border: 1px solid var(--border);">
                <option value="fr" {% if user.language == 'fr' %}selected{% endif %}>Français</option>
                <option value="ln" {% if user.language == 'ln' %}selected{% endif %}>Lingala</option>
                <option value="sw" {% if user.language == 'sw' %}selected{% endif %}>Kiswahili</option>
                <option value="en" {% if user.language == 'en' %}selected{% endif %}>English</option>
            </select>
        </div>

        <!-- BOUTON DE SAUVEGARDE GÉNÉRALE -->
        <button type="submit" class="btn" style="width: 100%; padding: 15px; margin-bottom: 20px;">
            ENREGISTRER LES MODIFICATIONS
        </button>

        <!-- ZONE DE DÉCONNEXION (Visible et Rouge) -->
        <div class="card" style="border: 1px solid var(--err); background: rgba(255, 77, 77, 0.05);">
            <h3 style="color: var(--err); margin-bottom: 10px;">Zone de Danger</h3>
            <p class="small muted">Quitter l'édifice PH FIRE AFRICA pour cette session.</p>
            <a href="{{ url_for('logout') }}" class="btn" style="background: var(--err); color: white; width: 100%; margin-top: 10px; text-decoration: none; text-align: center;">
                🔴 SE DÉCONNECTER
            </a>
        </div>
    </form>
</div>
{% endblock %}
