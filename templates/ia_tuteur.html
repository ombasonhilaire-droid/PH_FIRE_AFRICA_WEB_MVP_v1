{% extends "base.html" %}
{% block content %}
<div class="card" style="border-bottom: 3px solid var(--accent);">
    <h2>🧠 Mwalimu - Ton Tuteur IA</h2>
    <p class="muted small">Pose tes questions sur le code ou l'infrastructure. La mine d'or est dans la compréhension.</p>
</div>

<div id="chat-box" class="card" style="height: 400px; overflow-y: auto; background: rgba(0,0,0,0.2); display: flex; flex-direction: column; gap: 10px; padding: 20px;">
    <!-- Les messages apparaîtront ici -->
    <div class="msg-other" style="align-self: flex-start; background: #1a1a2e; padding: 10px; border-radius: 15px; border-left: 3px solid var(--accent); max-width: 85%;">
        Bonjour Bâtisseur {{ me.display_name }}. Quel concept informatique souhaites-tu dompter aujourd'hui ?
    </div>
</div>

<div class="card" style="margin-top: 10px; display: flex; gap: 10px; flex-direction: row;">
    <input type="text" id="user-input" placeholder="Explique-moi les listes en Python..." style="flex: 1;">
    <button class="btn" onclick="askMwalimu()">Envoyer</button>
</div>

<script>
    function askMwalimu() {
        const input = document.getElementById('user-input');
        const box = document.getElementById('chat-box');
        const text = input.value;
        if(!text) return;

        // Ajouter mon message
        box.innerHTML += `<div class="msg-me" style="align-self: flex-end; background: var(--accent); color: black; padding: 10px; border-radius: 15px; max-width: 85%;">${text}</div>`;
        input.value = "";
        box.scrollTop = box.scrollHeight;

        // Appeler l'IA
        fetch('/ask-ia', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({prompt: text})
        })
        .then(res => res.json())
        .then(data => {
            box.innerHTML += `<div class="msg-other" style="align-self: flex-start; background: #1a1a2e; padding: 10px; border-radius: 15px; border-left: 3px solid var(--accent); max-width: 85%;">${data.response}</div>`;
            box.scrollTop = box.scrollHeight;
        });
    }
</script>
{% endblock %}
