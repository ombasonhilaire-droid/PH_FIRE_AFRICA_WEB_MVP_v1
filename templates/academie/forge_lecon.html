{% extends "base.html" %}
{% block content %}
<div class="container" style="max-width: 800px; margin-top: 20px;">
    
    <div class="card" style="border-left: 5px solid var(--accent); background: linear-gradient(to right, #1a1a2e, #0b0b10);">
        <h2 style="color: var(--accent);">🛠️ La Forge de l'Architecte</h2>
        <p class="muted">Ici, vous créez les briques de savoir pour l'Afrique.</p>
    </div>
    <!-- À ajouter dans le formulaire de forge_lecon.html -->
<div class="card" style="background: rgba(255, 204, 0, 0.05); border: 1px solid var(--warn);">
    <h3>🧠 Créer le Quiz de validation</h3>
    <label class="small">Question du Quiz</label>
    <input type="text" name="quiz_question" value="{{ lecon.quiz_question if lecon else '' }}" placeholder="Ex: Quelle est la capitale du Congo ?">
    
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <input type="text" name="opt_a" value="{{ lecon.opt_a if lecon else '' }}" placeholder="Option A">
        <input type="text" name="opt_b" value="{{ lecon.opt_b if lecon else '' }}" placeholder="Option B">
    </div>
    <label class="small">Lettre de la bonne réponse (A ou B)</label>
    <input type="text" name="correct_opt" value="{{ lecon.correct_opt if lecon else '' }}" maxlength="1" style="width: 50px; text-align: center;">
</div>
    <form method="post" class="card">
        <label class="muted small">Titre de la Leçon</label>
        <input type="text" name="titre" value="{{ lecon.titre if lecon else '' }}" placeholder="Ex: Introduction/informatique/programmation/Python/C++/JavaScript/HTML/CSS/Variables etc..." required 
               style="width: 100%; padding: 12px; background: #000; color: white; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 20px;">

        <label class="muted small">Ranger dans le Module</label>
        <select name="module_id" style="width: 100%; padding: 12px; background: #000; color: white; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 20px;">
            {% for m in modules %}
            <option value="{{ m.id }}" {% if lecon and lecon.module_id == m.id %}selected{% endif %}>
                [{{ m.cursus }}] - {{ m.objectif }}
            </option>
            {% endfor %}
        </select>

        <label class="muted small">Contenu du Cours informatique(autorisé)</label>
        <textarea name="contenu" rows="12" placeholder="Écrivez votre cours ici..." 
                  style="width: 100%; padding: 12px; background: #000; color: white; border: 1px solid var(--border); border-radius: 8px; font-family: monospace;">{{ lecon.contenu if lecon else '' }}</textarea>
        
        <div style="margin-top: 20px; display: flex; gap: 10px;">
            <button type="submit" class="btn" style="flex: 1; background: var(--accent); color: white; font-weight: bold;">
                🚀 ENREGISTRER DANS L'ACADÉMIE
            </button>
            <a href="{{ url_for('academie_home') }}" class="btn btn-ghost" style="text-decoration: none;">Annuler</a>
        </div>
    </form>
</div>

<div class="container" style="max-width: 800px;">
    <div class="card" style="border-left: 5px solid var(--accent);">
        <h2>🛠️ Forge de Savoir Standard</h2>
        <p class="muted">Créez ou modifiez une brique de l'édifice.</p>
    </div>

    <form method="post" enctype="multipart/form-data" class="card">
        <label class="muted small">Titre de la Leçon</label>
        <input type="text" name="titre" value="{{ lecon.titre if lecon else '' }}" required>

        <label class="muted small">Ranger dans le Module (Classement Automatique)</label>
        <select name="module_id" style="width: 100%; padding: 12px; background: #000; color: white; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 20px;">
            {% set current_branche = [] %}
            {% for m in modules %}
                <option value="{{ m.id }}" {% if lecon and lecon.module_id == m.id %}selected{% endif %}>
                    {{ m.branche }} > {{ m.objectif }}
                </option>
            {% endfor %}
        </select>

        <!-- SECTION MULTIMÉDIA (L'ILLUSTRATEUR) -->
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; padding: 15px; background: rgba(255,255,255,0.02); border-radius: 8px; border: 1px dashed var(--border);">
            <div>
                <label class="small">🖼️ Image d'illustration</label>
                <input type="file" name="lesson_image" accept="image/*">
            </div>
            <div>
                <label class="small">🎥 Vidéo du cours</label>
                <input type="file" name="lesson_video" accept="video/mp4">
            </div>
        </div>

        <label class="muted small">Contenu Pédagogique (HTML autorisé)</label>
        <textarea name="contenu" rows="10" style="font-family: monospace;">{{ lecon.contenu if lecon else '' }}</textarea>
        
        <button type="submit" class="btn" style="width: 100%; margin-top: 20px;">🚀 ENREGISTRER LA LEÇON</button>
    </form>
</div>
{% endblock %}
