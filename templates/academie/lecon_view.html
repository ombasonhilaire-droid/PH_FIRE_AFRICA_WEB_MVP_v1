{% extends "base.html" %}
{% block content %}
<div class="card" style="border-left: 5px solid var(--accent);">
    <small class="muted">{{ lecon.domaine_nom }} > {{ lecon.cursus_titre }}</small>
    <h1 style="margin-top: 10px;">{{ lecon.titre }}</h1>
</div>

<div class="card" style="line-height: 1.8; font-size: 1.1em; min-height: 300px;">
    {{ lecon.contenu | safe }}
</div>

<div class="card" style="border: 1px dashed var(--ok);">
    <h3>🛠️ Exercice Obligatoire</h3>
    <p>Pour valider cette leçon et passer à la suite, résolvez le problème suivant...</p>
    <button class="btn" style="background: var(--ok); color: black;">Soumettre mon Code</button>
</div>

<!-- MOTEUR DE LA MINE D'OR (Heartbeat) -->
<script>
    setInterval(function() {
        fetch("/api/mine/heartbeat/{{ lecon.id }}", {
            method: "POST",
            headers: {"Content-Type": "application/json"}
        })
        .then(res => res.json())
        .then(data => console.log("Extraction PH FIRE en cours..."));
    }, 30000);
</script>
{% endblock %}
